services:
  - type: web
    name: mta-voice-agent
    runtime: node
    plan: starter          # free tier sleeps — use starter ($7/mo) for always-on voice
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-preview-native-audio-dialog
      - key: GEMINI_VOICE
        value: Aoede
      - key: EXOTEL_API_KEY
        sync: false
      - key: EXOTEL_API_TOKEN
        sync: false
      - key: EXOTEL_SID
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_INBOX_DB_ID
        value: db41e3034d064fb68f81dbc45a421587
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TRANSFER_PHONE_NUMBER
        value: "+919694322131"
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
